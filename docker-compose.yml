services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"       # AMQP protocol port
      - "15672:15672"     # RabbitMQ Management Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  producer:
    build:
      context: ./producer
    container_name: telemetry-producer
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/producer.db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_QUEUE=mailbox_queue
    volumes:
      - ./producer/data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    build:
      context: ./consumer
    container_name: telemetry-consumer
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/consumer.db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_QUEUE=mailbox_queue
    volumes:
      - ./consumer/data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
